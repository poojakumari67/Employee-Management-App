<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Employee Details</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

	<h1>Employee Details</h1>

	<div class="detail-card">

		<div class="detail-row">
			<b>ID :</b> <span th:text="${employee.id}"></span>
		</div>

		<div class="detail-row">
			<b>Name :</b> <span th:text="${employee.name}"></span>
		</div>

		<div class="detail-row">
			<b>Email :</b> <span th:text="${employee.email}"></span>
		</div>

		<div class="detail-row">
			<b>Department :</b> <span th:text="${employee.department}"></span>
		</div>

		<div class="detail-row">
			<b>Salary :</b> <span th:text="${employee.salary}"></span>
		</div>

		<br> <a href="/" class="add-btn"> Back </a>

	</div>

</body>

</html>
