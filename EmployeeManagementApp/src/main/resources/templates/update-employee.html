<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Update Employee</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

	<h1>Update Employee</h1>

	<form action="/update" method="post">

		<input type="hidden" name="id" th:value="${employee.id}"> <label>Name</label>
		<input type="text" name="name" th:value="${employee.name}"> <label>Email</label>
		<input type="email" name="email" th:value="${employee.email}">

		<label>Department</label> <input type="text" name="department"
			th:value="${employee.department}"> <label>Salary</label> <input
			type="number" name="salary" th:value="${employee.salary}">

		<button type="submit">Update Employee</button>

	</form>

</body>

</html>
